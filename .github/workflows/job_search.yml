name: Daily LinkedIn Job Search

# ─── TRIGGERS ─────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 08:00 Beirut (UTC+3) every day
  workflow_dispatch:         # Manual trigger from GitHub Actions UI (for testing)

# ─── JOB ──────────────────────────────────────────────────────────────────────
jobs:
  job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository (latest including state.json)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_search.py
