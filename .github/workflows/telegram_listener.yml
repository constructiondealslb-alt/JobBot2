name: Telegram Command Listener

# ─── TRIGGERS ─────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 * * * *'     # Every hour at :00 — max 1 hour wait for stop/activate
  workflow_dispatch:          # Manual trigger for testing

# ─── JOB ──────────────────────────────────────────────────────────────────────
jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Should finish in ~15 seconds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram listener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_listener.py

      - name: Commit state.json if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Job Search Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add state.json
          git diff --staged --quiet || (git commit -m "bot: update report state" && git push)
